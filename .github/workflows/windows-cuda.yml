name: Build Windows CUDA (Manual)

on:
  workflow_dispatch: # 仅手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2.0' 
          method: 'network'

      - name: Configure CMake
        # VIBEVOICE_SHARED=OFF 解决 LNK2019 链接错误
        run: |
          cmake -B build `
            -DGGML_CUDA=ON `
            -DVIBEVOICE_BUILD_TESTS=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DVIBEVOICE_SHARED=OFF

      - name: Build
        run: |
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Verify Build
        shell: pwsh
        run: |
          Write-Host "Checking build output directory..."
          if (Test-Path "build/bin/Release") {
            ls build/bin/Release/
          } else {
            Write-Error "Directory build/bin/Release not found!"
            exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibevoice-windows-full-binaries
          # 收集所有相关的二进制文件
          path: |
            build/bin/Release/*.exe
            build/bin/Release/*.dll
            build/bin/Release/*.lib
            build/bin/Release/*.pdb
          if-no-files-found: warn
